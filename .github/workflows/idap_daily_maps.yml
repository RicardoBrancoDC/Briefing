name: IDAP Daily Maps

on:
  schedule:
    # 07:00 America/Sao_Paulo = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare folders
        run: |
          mkdir -p .cache out resources

      - name: Sanity check inputs
        run: |
          echo "RSS_URL=https://idapfile.mdr.gov.br/idap/api/rss/cap"
          echo "UF_GEOJSON_PATH=resources/br_uf.geojson"
          echo "OUT_DIR=out"
          echo "STATE_PATH=.cache/state.json"
          echo ""
          echo "Files in resources/:"
          ls -la resources || true
          echo ""
          echo "First bytes of br_uf.geojson (if exists):"
          head -c 200 resources/br_uf.geojson 2>/dev/null || echo "br_uf.geojson not found"

      - name: Run daily maps
        env:
          RSS_URL: "https://idapfile.mdr.gov.br/idap/api/rss/cap"
          UF_GEOJSON_PATH: "resources/br_uf.geojson"
          OUT_DIR: "out"
          STATE_PATH: ".cache/state.json"
          # MAX_ITEMS: "200"   # opcional, vazio = sem limite
        run: |
          python scripts/idap_daily_maps.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: idap_daily_outputs
          path: |
            out/
            .cache/state.json
          if-no-files-found: warn
