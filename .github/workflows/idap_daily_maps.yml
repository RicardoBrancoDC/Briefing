name: Gerar e publicar mapas no GitHub Pages

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Criar pastas de saída do site
        run: |
          mkdir -p site/imagens
          mkdir -p saida

      - name: Gerar imagens
        run: |
          python scripts/idap_daily_maps.py

      
          - name: Copiar imagens geradas para o site
        run: |
         cp -f out/run_*/*.png site/imagens/ || true
         ls -la site/imagens/

      - name: Gerar arquivo de data da última atualização
        run: |
          python - << 'PY'
          import json
          from datetime import datetime, timezone

          dados = {
              "gerado_em": datetime.now(timezone.utc).isoformat()
          }

          with open("site/ultima_atualizacao.json", "w", encoding="utf-8") as f:
              json.dump(dados, f, ensure_ascii=False, indent=2)
          PY

      - name: Validar arquivos mínimos
        run: |
          test -f site/index.html
          test -f site/ultima_atualizacao.json

      - name: Publicar artifact do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
