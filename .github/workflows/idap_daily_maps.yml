name: IDAP Daily Maps

on:
  schedule:
    # 07:00 America/Sao_Paulo = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily maps
        env:
          RSS_URL: "https://idapfile.mdr.gov.br/idap/api/rss/cap"
          UF_GEOJSON_PATH: "resources/br_uf.geojson"
          OUT_DIR: "out"
          STATE_PATH: ".cache/state.json"
          MAX_ITEMS: ""  # vazio = sem limite
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p .cache out
          python scripts/idap_daily_maps.py
          echo "----- OUT TREE -----"
          find out -maxdepth 3 -type f -print

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: idap_daily_outputs
          path: out/
