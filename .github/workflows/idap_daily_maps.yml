name: IDAP Daily Maps + Pages

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Criar pastas necessárias
        run: |
          mkdir -p .cache out site/imagens
          [ -f .cache/state.json ] || echo "{}" > .cache/state.json
          [ -f .cache/historico_alertas.json ] || echo "[]" > .cache/historico_alertas.json

      - name: Verificar variáveis do Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN está vazio"
          else
            echo "TELEGRAM_BOT_TOKEN ok"
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID está vazio"
          else
            echo "TELEGRAM_CHAT_ID ok"
          fi

      - name: Run daily maps
        env:
          TZ: "America/Sao_Paulo"
          RSS_URL: "https://idapfile.mdr.gov.br/idap/api/rss/cap"
          UF_GEOJSON_PATH: "resources/br_uf.geojson"
          LOGO_PATH: "resources/marca_sedec.png"
          OUT_DIR: "out"
          STATE_PATH: ".cache/state.json"
          HISTORY_PATH: ".cache/historico_alertas.json"
          WINDOW_HOURS: "24"
          RETENTION_HOURS: "72"
          MAX_ITEMS: ""
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/idap_daily_maps.py

          echo "----- OUT TREE -----"
          find out -maxdepth 3 -type f -print || true

          echo "----- CACHE TREE -----"
          find .cache -maxdepth 2 -type f -print || true

      - name: Localizar pasta mais recente de saída
        id: localizar_saida
        run: |
          ULTIMA_PASTA=$(ls -dt out/run_* 2>/dev/null | head -n 1)

          echo "Última pasta encontrada: $ULTIMA_PASTA"

          if [ -z "$ULTIMA_PASTA" ]; then
            echo "Nenhuma pasta out/run_* encontrada."
            exit 1
          fi

          echo "pasta_saida=$ULTIMA_PASTA" >> $GITHUB_OUTPUT

      - name: Copiar imagens geradas para o site
        run: |
          PASTA="${{ steps.localizar_saida.outputs.pasta_saida }}"

          echo "Copiando PNGs de: $PASTA"
          cp -f "$PASTA"/*.png site/imagens/ || true

          echo ""
          echo "Arquivos copiados para site/imagens:"
          ls -la site/imagens/

      - name: Gerar arquivo de última atualização
        run: |
          python - << 'PY'
          import json
          from datetime import datetime, timezone

          dados = {
              "gerado_em": datetime.now(timezone.utc).isoformat()
          }

          with open("site/ultima_atualizacao.json", "w", encoding="utf-8") as f:
              json.dump(dados, f, ensure_ascii=False, indent=2)
          PY

      - name: Validar arquivos mínimos do site
        run: |
          test -f site/index.html
          test -f site/ultima_atualizacao.json

      - name: Mostrar estrutura final do site
        run: |
          echo "Conteúdo final da pasta site:"
          find site -maxdepth 3 -type f | sort

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: idap_daily_outputs
          path: |
            out/
            .cache/state.json
            .cache/historico_alertas.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload do artifact do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Commit history/state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .cache/state.json .cache/historico_alertas.json

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git commit -m "Atualiza histórico IDAP [skip ci]"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
