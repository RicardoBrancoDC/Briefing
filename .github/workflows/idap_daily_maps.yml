name: IDAP Daily Maps

on:
  schedule:
    # 07:00 America/Sao_Paulo = 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore cache (.cache)
        uses: actions/cache@v4
        with:
          path: .cache
          key: idap-daily-cache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            idap-daily-cache-${{ runner.os }}-

      - name: Run daily maps
        env:
          RSS_URL: "https://idapfile.mdr.gov.br/idap/api/rss/cap"
          UF_GEOJSON_PATH: "resources/br_uf.geojson"
          OUT_DIR: "out"
          CACHE_DIR: ".cache"
          # Se quiser limitar por teste:
          # MAX_ITEMS: "50"

          # Telegram (se quiser enviar resumo)
          SEND_TELEGRAM: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p .cache out
          python scripts/idap_daily_maps.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: idap_daily_outputs
          path: out/
